<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countries and Capitals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Countries and Capitals</h1>
    <div class="controls">
      <label for="limit-select">Show:</label>
      <select id="limit-select">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </div>
    <table id="countries-table">
      <thead>
        <tr>
          <th class="id-col">ID</th>
          <th>Country</th>
          <th>Capital</th>
          <th>Famous Place</th>
        </tr>
        <tr class="filters">
          <td class="id-col"></td>
          <td><input type="text" id="search-country" placeholder="Search here" /></td>
          <td><input type="text" id="search-capital" placeholder="Search here" /></td>
          <td><input type="text" id="search-place" placeholder="Search here" /></td>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="pagination">
      <div style="flex:1;display:flex;align-items:center;">
        <label for="limit-select-bottom" class="limit-label">Show:</label>
        <select id="limit-select-bottom" aria-label="Rows per page">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="50">50</option>
        </select>
      </div>
      <div id="pagination-controls" class="pagination-controls"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
